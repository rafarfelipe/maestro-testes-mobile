appId: com.curso.shopdemo
env:
    EMAIL: ${EMAIL || "cliente@shopdemo.com"}
    SENHA: ${SENHA || "123456"}
---
- runFlow:
    when:
      notVisible:
        id: "tela-catalogo"
    commands:
      # Garantir que estamos na tela de login antes de qualquer interação
      - extendedWaitUntil:
          visible:
            id: "tela-login"
          timeout: 120000
      - tapOn:
          id: "input-email"
      - inputText: ${EMAIL}
      - tapOn:
          id: "input-senha"
      - inputText: ${SENHA}
      - hideKeyboard
      - tapOn: "btn-entrar"
      # Garantir que o login foi efetivado antes de prosseguir
      - extendedWaitUntil:
          visible:
            id: "tela-catalogo"
          timeout: 60000
      - assertVisible: 
          id: "tela-catalogo"