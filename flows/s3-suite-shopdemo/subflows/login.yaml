appId: com.curso.shopdemo
env:
    EMAIL: ${EMAIL || "cliente@shopdemo.com"}
    SENHA: ${SENHA || "123456"}
---
- runFlow:
    when:
      notVisible:
        id: "tela-catalogo"
    commands:
      - extendedWaitUntil:
          visible:
            id: "tela-login"
          timeout: 240000
      - extendedWaitUntil:
          visible:
            id: "input-email"
          timeout: 60000
      - tapOn:
          id: "input-email"
      - inputText: ${EMAIL}
      - tapOn:
          id: "input-senha"
      - inputText: ${SENHA}
      - hideKeyboard
      - tapOn: "btn-entrar"
      - extendedWaitUntil:
          visible:
            id: "tela-catalogo"
          timeout: 40000
      - assertVisible: 
          id: "tela-catalogo"