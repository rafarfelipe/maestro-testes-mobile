appId: com.curso.shopdemo
---
- launchApp:
    clearState: true
- runFlow: subflows/login.yaml

# Scroll ate encontrar a Mochila para Notebook (scrollUntilVisible eh mais
# robusto que repeat+scroll, que pode travar/duplicar em listas FlatList)
- scrollUntilVisible:
    element: "Mochila para Notebook"

- assertVisible: "Mochila para Notebook"
- tapOn: "Mochila para Notebook"
- assertVisible:
    id: "tela-detalhe"
- assertVisible: "R$ 189,90"

- tapOn:
    id: "btn-adicionar"

# Aumenta a quantidade de 1 para 4 unidades (repeat times)
- repeat:
    times: 3
    commands:
      - tapOn:
          id: "btn-incrementar-detalhe"

- assertVisible: "4 no carrinho"