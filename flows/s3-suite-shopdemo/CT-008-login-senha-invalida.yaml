appId: com.curso.shopdemo
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "tela-login"
    timeout: 90000
- assertVisible:
    id: "tela-login"
- tapOn:
    id: "input-email"
- inputText: "cliente@shopdemo.com"
- tapOn:
    id: "input-senha"
- inputText: "senhaerrada"
- hideKeyboard
- tapOn: "btn-entrar"

# Cenario negativo: credenciais invalidas nao devem navegar para o catalogo
- assertVisible:
    id: "erro-login"
- assertNotVisible:
    id: "tela-catalogo"
