name: Maestro Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: maestro-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Baixar APK da GitHub Release "apk"
        # O binario nao e versionado no git (ver .gitignore). Ele deve estar
        # publicado como asset da Release "apk" neste repo.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p apk
          ASSET_URL=$(gh api repos/${{ github.repository }}/releases/tags/apk \
            --jq '.assets[] | select(.name=="ShopDemo.apk") | .url')
          if [ -z "$ASSET_URL" ]; then
            echo "::error::APK nao encontrado na Release 'apk'. Faca o upload de ShopDemo.apk como asset da Release 'apk'."
            exit 1
          fi
          gh api "$ASSET_URL" --header "Accept: application/octet-stream" > apk/ShopDemo.apk
          ls -la apk/ShopDemo.apk

      - name: Subir emulador e rodar suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          disk-size: 8192M
          heap-size: 1024M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-snapshot -no-metrics
          disable-animations: true
          script: |
            adb wait-for-device
            # Aguardar o boot completo do Android
            adb shell "while [[ -z $(getprop sys.boot_completed) ]]; do sleep 1; done"
            adb install apk/ShopDemo.apk
            mkdir -p reports
            maestro test --format junit --output reports/resultado.xml flows/s3-suite-shopdemo/

      - name: Publicar relatorio JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-maestro
          path: reports/resultado.xml

      - name: Publicar screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-maestro
          path: .maestro/screenshots/**/*.png

      - name: Exibir resultado no Actions
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Maestro Suite
          path: reports/resultado.xml
          reporter: java-junit
          fail-on-error: false