name: Maestro Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Habilitar KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Subir emulador e rodar suite
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            adb install ShopDemo.apk
            mkdir -p reports
            maestro test --format junit --output reports/resultado.xml flows/s3-suite-shopdemo/

      - name: Publicar relatorio JUnit
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-maestro
          path: reports/resultado.xml

      - name: Publicar screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-maestro
          path: .maestro/screenshots/

      - name: Exibir resultado no Actions
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maestro Suite
          path: reports/resultado.xml
          reporter: java-junit
          fail-on-error: false